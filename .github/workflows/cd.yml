name: CD

on:
  push:
    branches:
      - main
      - develop

jobs:
  run-pipeline:
    name: Run Phase 1 Data Pipeline
    runs-on: ubuntu-latest

    env:
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Phase 1 pipeline
        run: |
          dagster asset materialize \
            -m dagster_pipeline.assets.phase1 \
            --select "*"

      - name: Upload DuckDB artifact
        uses: actions/upload-artifact@v4
        with:
          name: quant-duckdb
          path: artifacts/quant.duckdb
          retention-days: 7
